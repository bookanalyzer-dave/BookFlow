steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/price-research-agent:latest', '-f', 'agents/price-research-agent/Dockerfile', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/price-research-agent:latest']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'run'
    - 'deploy'
    - 'price-research-agent'
    - '--image'
    - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/price-research-agent:latest'
    - '--region'
    - 'europe-west1'
    - '--platform'
    - 'managed'
    - '--no-allow-unauthenticated'
    - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
    - '--update-env-vars=GCP_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GCS_BUCKET_NAME=${PROJECT_ID}-book-images,VERTEX_AI_LOCATION=europe-west1'
    - '--memory=1Gi'

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      PROJECT_NUMBER=$(gcloud projects describe ${PROJECT_ID} --format="value(projectNumber)")
      gcloud eventarc triggers create price-research-trigger \
        --location=europe-west1 \
        --destination-run-service=price-research-agent \
        --destination-run-region=europe-west1 \
        --event-filters="type=google.cloud.pubsub.topic.v1.messagePublished" \
        --transport-topic=projects/${PROJECT_ID}/topics/price-research-requests \
        --service-account=$${PROJECT_NUMBER}-compute@developer.gserviceaccount.com \
        || echo "Trigger might already exist, continuing..."

images:
- 'europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/price-research-agent:latest'
